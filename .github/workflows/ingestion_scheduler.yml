name: Scheduled Data Ingestion Pipeline

on:
  schedule:
    # Runs at 10:00 AM IST (4:30 AM UTC) on weekdays (Mon-Fri)
    - cron: '30 4 * * 1-5'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  ingest-and-update-vectordb:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the updated database back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 3.11 provides stable wheel support for ChromaDB
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Phase 1.1 - Data Extraction
        env:
          PYTHONPATH: .
        run: python src/phase1_ingestion/subphase1_1_extraction/main.py
        
      - name: Run Phase 1.2 - Data Cleaning
        env:
          PYTHONPATH: .
        run: python src/phase1_ingestion/subphase1_2_cleaning/cleaner.py
        
      - name: Run Phase 1.3 - Chunking
        env:
          PYTHONPATH: .
        run: python src/phase1_ingestion/subphase1_3_chunking/chunker.py
        
      - name: Run Phase 1.4 - Embedding Generation & Storage
        env:
          PYTHONPATH: .
        run: python src/phase1_ingestion/subphase1_4_embedding/embedder.py

      - name: Commit Updated Data & VectorDB
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Daily MF Data Ingestion & VectorDB Sync"
          file_pattern: "data/*"
